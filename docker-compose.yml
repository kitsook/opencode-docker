version: '3.8'

services:
  opencode:
    build:
      context: .
      args:
        USER_ID: ${UID:-1000}
        GROUP_ID: ${GID:-100}
    network_mode: host
    volumes:
      - ${HOME}/.local/share/opencode:/home/opencodeuser/.local/share/opencode
      - ${HOME}/.config/opencode/AGENTS.md:/home/opencodeuser/.config/opencode/AGENTS.md
      - ${HOME}/.config/opencode/opencode.json:/home/opencodeuser/.config/opencode/opencode.json
      - ${HOME}/.config/opencode/prompts/build.txt:/home/opencodeuser/.config/opencode/prompts/build.txt
      - .:/app
    stdin_open: true
    tty: true
    command: ["opencode", "/app"]



